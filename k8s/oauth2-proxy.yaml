---
# oauth2-proxy in inline reverse-proxy mode: the cv-nuxt Ingress points here,
# oauth2-proxy authenticates against rauthy (OIDC) and proxies to cv-nuxt:3000.
# Access is gated to the rauthy group `apps:internal`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: cv-nuxt
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.binarydream.fi/auth/v1/
            - --client-id=cv-nuxt
            - --redirect-url=https://cv.binarydream.fi/oauth2/callback
            - --upstream=http://cv-nuxt:3000
            - --http-address=0.0.0.0:4180
            - --email-domain=*                       # allow any authenticated user...
            - --scope=openid email profile groups
            - --allowed-group=apps:internal          # ...but only if in this rauthy group
            - --code-challenge-method=S256           # rauthy requires PKCE
            - --cookie-secure=true
            - --cookie-domain=cv.binarydream.fi
            - --reverse-proxy=true                   # trust Traefik's X-Forwarded-*
            - --skip-provider-button=true            # go straight to rauthy login
            - --pass-user-headers=true
            - --set-xauthrequest=true
          env:
            # client-secret + cookie-secret come from the SealedSecret; oauth2-proxy
            # auto-reads OAUTH2_PROXY_* env vars (no need to pass them as flags).
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-cv-nuxt
                  key: OAUTH2_PROXY_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-cv-nuxt
                  key: OAUTH2_PROXY_COOKIE_SECRET
          ports:
            - containerPort: 4180
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: cv-nuxt
  labels:
    app: oauth2-proxy
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
